name: Daily Stock Data Export

on:
  schedule:
    - cron: '30 15 * * 1-5'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data export
        env:
          SSI_CONSUMER_ID: ${{ secrets.SSI_CONSUMER_ID }}
          SSI_CONSUMER_SECRET: ${{ secrets.SSI_CONSUMER_SECRET }}
          SSI_PRIVATE_KEY: ${{ secrets.SSI_PRIVATE_KEY }}
        run: python export_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "daily data export $(date '+%Y-%m-%d')"
          git push
